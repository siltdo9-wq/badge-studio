<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badge Studio - Créateur de Badges Animés</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            color: var(--light);
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            opacity: 0.3;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-100px) rotate(180deg); opacity: 0.6; }
        }

        /* Header */
        header {
            position: relative;
            z-index: 10;
            padding: 2rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.9) 0%, transparent 100%);
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* Main Container */
        .container {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 2rem;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Glass Panels */
        .panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.2);
        }

        .panel-title {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }

        /* Controls */
        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        input[type="text"], input[type="color"], select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        input[type="color"] {
            height: 50px;
            cursor: pointer;
            border: none;
            padding: 5px;
        }

        .color-presets {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .color-preset {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .color-preset:hover {
            transform: scale(1.1);
            border-color: white;
        }

        .color-preset.active {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* Range Slider */
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.5);
            transition: transform 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 0.75rem;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Preview Area */
        .preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            position: relative;
        }

        .badge-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Badge Styles */
        .badge {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .badge::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            animation: rotate 4s linear infinite;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .badge:hover::before {
            opacity: 1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .badge-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--badge-color-1, #6366f1), var(--badge-color-2, #ec4899));
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .badge-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .badge-text {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .badge-subtext {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-top: 0.25rem;
        }

        /* Shape Variants */
        .badge.shield .badge-inner {
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .badge.hexagon .badge-inner {
            border-radius: 0;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .badge.square .badge-inner {
            border-radius: 30px;
        }

        .badge.diamond .badge-inner {
            border-radius: 0;
            transform: rotate(45deg);
        }

        .badge.diamond .badge-content {
            transform: rotate(-45deg);
        }

        /* Animations */
        .badge.pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .badge.glow {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 20px var(--badge-color-1, #6366f1); }
            to { box-shadow: 0 0 40px var(--badge-color-2, #ec4899), 0 0 60px var(--badge-color-1, #6366f1); }
        }

        .badge.float {
            animation: float-badge 3s infinite ease-in-out;
        }

        @keyframes float-badge {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .badge.spin {
            animation: spin-badge 4s linear infinite;
        }

        @keyframes spin-badge {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .badge.shake {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Effects Panel */
        .effect-btn {
            padding: 0.5rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            margin: 0.25rem;
        }

        .effect-btn:hover, .effect-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            transform: scale(1.05);
        }

        .effects-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* Templates */
        .template-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .template-item {
            aspect-ratio: 1;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            padding: 1rem;
        }

        .template-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .template-item.active {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.2);
        }

        .template-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .template-name {
            font-size: 0.8rem;
            text-align: center;
        }

        /* Export Options */
        .export-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
                max-width: 600px;
            }

            .preview-area {
                order: -1;
            }
        }

        /* Loading Animation */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Icon Selector */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.5rem;
            max-height: 150px;
            overflow-y: auto;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .icon-option {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .icon-option:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.2);
        }

        .icon-option.selected {
            background: var(--primary);
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="loader"></div>
    </div>

    <!-- Background Animation -->
    <div class="bg-animation" id="bgAnimation"></div>

    <!-- Header -->
    <header>
        <h1>🏅 Badge Studio</h1>
        <p class="subtitle">Créez des badges animés et uniques en quelques clics</p>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Left Panel: Controls -->
        <div class="panel">
            <h2 class="panel-title">Personnalisation</h2>

            <div class="control-group">
                <label class="control-label">Texte principal</label>
                <input type="text" id="mainText" value="EXPERT" maxlength="10">
            </div>

            <div class="control-group">
                <label class="control-label">Sous-texte</label>
                <input type="text" id="subText" value="Level 99" maxlength="15">
            </div>

            <div class="control-group">
                <label class="control-label">Icône</label>
                <div class="icon-grid" id="iconGrid">
                    <!-- Icons will be populated by JS -->
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">Couleur 1 (Dégradé)</label>
                <input type="color" id="color1" value="#6366f1">
                <div class="color-presets" id="colorPresets1"></div>
            </div>

            <div class="control-group">
                <label class="control-label">Couleur 2 (Dégradé)</label>
                <input type="color" id="color2" value="#ec4899">
                <div class="color-presets" id="colorPresets2"></div>
            </div>

            <div class="control-group">
                <label class="control-label">Taille du badge</label>
                <input type="range" id="badgeSize" min="150" max="300" value="200">
            </div>
        </div>

        <!-- Center Panel: Preview -->
        <div class="panel preview-area">
            <div class="badge-container">
                <div class="badge" id="badge">
                    <div class="badge-inner" id="badgeInner">
                        <div class="badge-content">
                            <div class="badge-icon" id="badgeIcon">⭐</div>
                            <div class="badge-text" id="badgeText">EXPERT</div>
                            <div class="badge-subtext" id="badgeSubtext">Level 99</div>
                        </div>
                    </div>
                </div>
            </div>
            <p style="margin-top: 2rem; color: #64748b; font-size: 0.9rem;">
                💡 Cliquez sur le badge pour tester l'animation
            </p>
        </div>

        <!-- Right Panel: Templates & Effects -->
        <div>
            <div class="panel" style="margin-bottom: 1.5rem;">
                <h2 class="panel-title">Formes</h2>
                <div class="template-grid" id="shapeGrid">
                    <div class="template-item active" data-shape="circle">
                        <div class="template-icon">⭕</div>
                        <div class="template-name">Cercle</div>
                    </div>
                    <div class="template-item" data-shape="shield">
                        <div class="template-icon">🛡️</div>
                        <div class="template-name">Bouclier</div>
                    </div>
                    <div class="template-item" data-shape="hexagon">
                        <div class="template-icon">⬡</div>
                        <div class="template-name">Hexagone</div>
                    </div>
                    <div class="template-item" data-shape="square">
                        <div class="template-icon">⬜</div>
                        <div class="template-name">Carré</div>
                    </div>
                </div>
            </div>

            <div class="panel" style="margin-bottom: 1.5rem;">
                <h2 class="panel-title">Animations</h2>
                <div class="effects-grid">
                    <button class="effect-btn active" data-effect="">Aucune</button>
                    <button class="effect-btn" data-effect="pulse">Pulse</button>
                    <button class="effect-btn" data-effect="glow">Lueur</button>
                    <button class="effect-btn" data-effect="float">Flottement</button>
                    <button class="effect-btn" data-effect="spin">Rotation</button>
                    <button class="effect-btn" data-effect="shake">Secousse</button>
                </div>
            </div>

            <div class="panel">
                <h2 class="panel-title">Exporter</h2>
                <button class="btn btn-primary" onclick="downloadBadge()">📥 Télécharger PNG</button>
                <button class="btn btn-secondary" onclick="copyCSS()">📋 Copier CSS</button>
                <button class="btn btn-secondary" onclick="resetBadge()">🔄 Réinitialiser</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Icons library
        const icons = ['⭐', '🏆', '🥇', '🎯', '💎', '🔥', '⚡', '💪', '🚀', '🎨', '💻', '🎮', '📚', '🎵', '⚽', '🏀', '🎖️', '🏅', '🎗️', '🔰', '✅', '💯', '🌟', '👑'];

        // Color presets
        const colorPresets = [
            '#6366f1', '#ec4899', '#06b6d4', '#8b5cf6', '#f59e0b', 
            '#10b981', '#ef4444', '#3b82f6', '#f97316', '#84cc16'
        ];

        // State
        let currentState = {
            mainText: 'EXPERT',
            subText: 'Level 99',
            icon: '⭐',
            color1: '#6366f1',
            color2: '#ec4899',
            shape: 'circle',
            effect: '',
            size: 200
        };

        // DOM Elements
        const badge = document.getElementById('badge');
        const badgeInner = document.getElementById('badgeInner');
        const badgeIcon = document.getElementById('badgeIcon');
        const badgeText = document.getElementById('badgeText');
        const badgeSubtext = document.getElementById('badgeSubtext');

        // Initialize
        function init() {
            createBackgroundParticles();
            populateIcons();
            populateColorPresets();
            setupEventListeners();

            // Hide loading screen
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);
        }

        // Create background particles
        function createBackgroundParticles() {
            const container = document.getElementById('bgAnimation');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 100 + 50 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        // Populate icon grid
        function populateIcons() {
            const grid = document.getElementById('iconGrid');
            icons.forEach((icon, index) => {
                const div = document.createElement('div');
                div.className = 'icon-option' + (index === 0 ? ' selected' : '');
                div.textContent = icon;
                div.onclick = () => selectIcon(icon, div);
                grid.appendChild(div);
            });
        }

        // Populate color presets
        function populateColorPresets() {
            ['colorPresets1', 'colorPresets2'].forEach((id, index) => {
                const container = document.getElementById(id);
                colorPresets.forEach((color, i) => {
                    const div = document.createElement('div');
                    div.className = 'color-preset' + (i === 0 && index === 0 ? ' active' : i === 1 && index === 1 ? ' active' : '');
                    div.style.background = color;
                    div.onclick = () => {
                        const inputId = index === 0 ? 'color1' : 'color2';
                        document.getElementById(inputId).value = color;
                        updateBadge();

                        // Update active state
                        container.querySelectorAll('.color-preset').forEach(p => p.classList.remove('active'));
                        div.classList.add('active');
                    };
                    container.appendChild(div);
                });
            });
        }

        // Select icon
        function selectIcon(icon, element) {
            currentState.icon = icon;
            document.querySelectorAll('.icon-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            updateBadge();
        }

        // Setup event listeners
        function setupEventListeners() {
            // Text inputs
            document.getElementById('mainText').addEventListener('input', (e) => {
                currentState.mainText = e.target.value || ' ';
                updateBadge();
            });

            document.getElementById('subText').addEventListener('input', (e) => {
                currentState.subText = e.target.value || ' ';
                updateBadge();
            });

            // Color inputs
            document.getElementById('color1').addEventListener('input', (e) => {
                currentState.color1 = e.target.value;
                updateBadge();
            });

            document.getElementById('color2').addEventListener('input', (e) => {
                currentState.color2 = e.target.value;
                updateBadge();
            });

            // Size slider
            document.getElementById('badgeSize').addEventListener('input', (e) => {
                currentState.size = e.target.value;
                updateBadge();
            });

            // Shape selection
            document.querySelectorAll('[data-shape]').forEach(item => {
                item.addEventListener('click', () => {
                    currentState.shape = item.dataset.shape;
                    document.querySelectorAll('[data-shape]').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    updateBadge();
                });
            });

            // Effect selection
            document.querySelectorAll('[data-effect]').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentState.effect = btn.dataset.effect;
                    document.querySelectorAll('[data-effect]').forEach(el => el.classList.remove('active'));
                    btn.classList.add('active');
                    updateBadge();
                });
            });

            // Click badge to animate
            badge.addEventListener('click', () => {
                badge.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    badge.style.transform = '';
                }, 150);
            });
        }

        // Update badge display
        function updateBadge() {
            // Update content
            badgeIcon.textContent = currentState.icon;
            badgeText.textContent = currentState.mainText;
            badgeSubtext.textContent = currentState.subText;

            // Update colors
            badgeInner.style.setProperty('--badge-color-1', currentState.color1);
            badgeInner.style.setProperty('--badge-color-2', currentState.color2);
            badgeInner.style.background = `linear-gradient(135deg, ${currentState.color1}, ${currentState.color2})`;

            // Update size
            badge.style.width = currentState.size + 'px';
            badge.style.height = currentState.size + 'px';

            // Update shape
            badge.className = 'badge';
            if (currentState.shape !== 'circle') {
                badge.classList.add(currentState.shape);
            }

            // Update effect
            if (currentState.effect) {
                badge.classList.add(currentState.effect);
            }
        }

        // Download badge as PNG
        function downloadBadge() {
            showToast('📸 Préparation du téléchargement...');

            // Create canvas
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const size = parseInt(currentState.size) * 2;
            canvas.width = size;
            canvas.height = size;

            // Draw background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, currentState.color1);
            gradient.addColorStop(1, currentState.color2);

            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2 - 10, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Add shadow
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 10;

            // Draw text
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.font = 'bold 40px Arial';
            ctx.fillText(currentState.mainText, size/2, size/2 - 10);

            ctx.font = '24px Arial';
            ctx.fillText(currentState.subText, size/2, size/2 + 30);

            // Draw icon
            ctx.font = '60px Arial';
            ctx.fillText(currentState.icon, size/2, size/2 - 60);

            // Download
            const link = document.createElement('a');
            link.download = `badge-${currentState.mainText.toLowerCase().replace(/\s+/g, '-')}.png`;
            link.href = canvas.toDataURL();
            link.click();

            showToast('✅ Badge téléchargé avec succès !');
        }

        // Copy CSS
        function copyCSS() {
            const css = `
.badge-custom {
    width: ${currentState.size}px;
    height: ${currentState.size}px;
    background: linear-gradient(135deg, ${currentState.color1}, ${currentState.color2});
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    ${currentState.effect === 'pulse' ? 'animation: pulse 2s infinite;' : ''}
    ${currentState.effect === 'glow' ? 'animation: glow 2s infinite alternate;' : ''}
    ${currentState.effect === 'float' ? 'animation: float 3s infinite ease-in-out;' : ''}
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}`;
            navigator.clipboard.writeText(css).then(() => {
                showToast('📋 CSS copié dans le presse-papiers !');
            });
        }

        // Reset badge
        function resetBadge() {
            currentState = {
                mainText: 'EXPERT',
                subText: 'Level 99',
                icon: '⭐',
                color1: '#6366f1',
                color2: '#ec4899',
                shape: 'circle',
                effect: '',
                size: 200
            };

            // Reset inputs
            document.getElementById('mainText').value = currentState.mainText;
            document.getElementById('subText').value = currentState.subText;
            document.getElementById('color1').value = currentState.color1;
            document.getElementById('color2').value = currentState.color2;
            document.getElementById('badgeSize').value = currentState.size;

            // Reset selections
            document.querySelectorAll('[data-shape], [data-effect]').forEach(el => el.classList.remove('active'));
            document.querySelector('[data-shape="circle"]').classList.add('active');
            document.querySelector('[data-effect=""]').classList.add('active');

            document.querySelectorAll('.icon-option').forEach((el, i) => {
                el.classList.toggle('selected', i === 0);
            });

            updateBadge();
            showToast('🔄 Badge réinitialisé');
        }

        // Show toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Start
        init();
    </script>
</body>
</html>
